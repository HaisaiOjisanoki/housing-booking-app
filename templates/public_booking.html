<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Public Booking - Housing Portal</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-light" onload="initPublicPage()">

    <!-- Navigation Bar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="#"><i class="bi bi-calendar-plus-fill me-2"></i>Housing Portal - Public Booking</a>
            <div class="d-flex align-items-center">
                <a href="dashboard.html" class="btn btn-outline-light btn-sm"><i class="bi bi-speedometer2 me-1"></i>Staff Login / Dashboard</a>
            </div>
        </div>
    </nav>

    <!-- Main Container -->
    <div class="container py-5">
        
        <div class="row justify-content-center">
            <div class="col-lg-8">
                
                <!-- Alert Notification -->
                <div id="bookingAlert" class="alert d-none mb-4" role="alert"></div>

                <div class="card shadow-sm border-0">
                    <div class="card-header bg-primary text-white py-3">
                        <h4 class="mb-0 fw-bold"><i class="bi bi-calendar-event me-2"></i>Schedule an Appointment</h4>
                        <p class="mb-0 small text-white-50">Fill out the form below to request a housing appointment or inspection.</p>
                    </div>
                    <div class="card-body p-4">
                        <form id="publicBookingForm" onsubmit="submitBooking(event)">
                            
                            <!-- Personal Info Section -->
                            <h6 class="text-primary fw-bold mb-3"><i class="bi bi-person-fill me-1"></i>1. Personal Information</h6>
                            <div class="row mb-3">
                                <div class="col-md-6 mb-3 mb-md-0">
                                    <label class="form-label small text-muted">First Name *</label>
                                    <input type="text" id="pubFirstName" class="form-control" required placeholder="John">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label small text-muted">Last Name *</label>
                                    <input type="text" id="pubLastName" class="form-control" required placeholder="Doe">
                                </div>
                            </div>

                            <div class="row mb-4">
                                <div class="col-md-6 mb-3 mb-md-0">
                                    <label class="form-label small text-muted">Branch of Service *</label>
                                    <select id="pubBranch" class="form-select" required>
                                        <option value="">-- Select Branch --</option>
                                        <option value="USMC">USMC</option>
                                        <option value="US Navy">US Navy</option>
                                        <option value="US Army">US Army</option>
                                        <option value="US Air Force">US Air Force</option>
                                        <option value="US Space Force">US Space Force</option>
                                        <option value="Civilian / Contractor">Civilian / Contractor</option>
                                    </select>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label small text-muted">Contact Email / Phone *</label>
                                    <input type="text" id="pubContact" class="form-control" required placeholder="john.doe@usmc.mil">
                                </div>
                            </div>

                            <hr class="mb-4">

                            <!-- Location Section: Camp Dropdown Synced with Super Admin -->
                            <h6 class="text-primary fw-bold mb-3"><i class="bi bi-geo-alt-fill me-1"></i>2. Location Details</h6>
                            <div class="row mb-4">
                                <div class="col-md-6 mb-3 mb-md-0">
                                    <label class="form-label small text-muted">Select Camp *</label>
                                    <select id="pubCampSelect" class="form-select" required onchange="updateBuildingsDropdown()">
                                        <option value="">-- Select Camp --</option>
                                    </select>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label small text-muted">Select Building Number *</label>
                                    <select id="pubBuildingSelect" class="form-select" required>
                                        <option value="">-- Select Camp First --</option>
                                    </select>
                                </div>
                            </div>

                            <hr class="mb-4">

                            <!-- Appointment Time & Purpose -->
                            <h6 class="text-primary fw-bold mb-3"><i class="bi bi-clock-fill me-1"></i>3. Schedule & Purpose</h6>
                            <div class="row mb-3">
                                <div class="col-md-6 mb-3 mb-md-0">
                                    <label class="form-label small text-muted">Appointment Date *</label>
                                    <input type="date" id="pubDate" class="form-control" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label small text-muted">Appointment Time *</label>
                                    <input type="time" id="pubTime" class="form-control" required min="08:00" max="17:00">
                                </div>
                            </div>

                            <div class="mb-4">
                                <label class="form-label small text-muted">Purpose of Visit *</label>
                                <select id="pubPurposeSelect" class="form-select" required>
                                    <option value="">-- Select Purpose --</option>
                                </select>
                            </div>

                            <div class="mb-4">
                                <label class="form-label small text-muted">Additional Comments / Notes (Optional)</label>
                                <textarea id="pubComments" class="form-control" rows="3" placeholder="Provide any additional details or context for your appointment..."></textarea>
                            </div>

                            <div class="d-grid">
                                <button type="submit" class="btn btn-primary btn-lg shadow-sm">
                                    <i class="bi bi-check-circle-fill me-2"></i>Submit Booking Request
                                </button>
                            </div>

                        </form>
                    </div>
                </div>

            </div>
        </div>

    </div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        function initPublicPage() {
            loadPublicCamps();
            loadPublicPurposes();
            loadPublicAvailability();

            const today = new Date().toISOString().split('T')[0];
            document.getElementById('pubDate').min = today;
        }

        // Dynamically populate Camp dropdown from Super Admin's localStorage settings
        function loadPublicCamps() {
            let camps = JSON.parse(localStorage.getItem('housing_camps')) || ["Camp Hansen", "Camp Schwab", "Camp Foster", "Camp Courtney", "Camp Kinser"];
            const campSelect = document.getElementById('pubCampSelect');
            if (!campSelect) return;

            campSelect.innerHTML = '<option value="">-- Select Camp --</option>';
            camps.forEach(camp => {
                campSelect.innerHTML += `<option value="${camp}">${camp}</option>`;
            });
        }

        // Dynamically load buildings assigned to the chosen camp
        function updateBuildingsDropdown() {
            const selectedCamp = document.getElementById('pubCampSelect').value;
            const buildingSelect = document.getElementById('pubBuildingSelect');
            if (!buildingSelect) return;

            buildingSelect.innerHTML = '<option value="">-- Select Building --</option>';
            if (!selectedCamp) return;

            let campBuildingsMap = JSON.parse(localStorage.getItem('housing_camp_buildings')) || {};
            let buildings = campBuildingsMap[selectedCamp] || [];

            if (buildings.length === 0) {
                buildingSelect.innerHTML = '<option value="">No buildings assigned to this camp</option>';
                return;
            }

            buildings.forEach(bldg => {
                buildingSelect.innerHTML += `<option value="${bldg}">${bldg}</option>`;
            });
        }

        function loadPublicPurposes() {
            let purposes = JSON.parse(localStorage.getItem('housing_purposes')) || [
                "Check-in / In-processing", 
                "Out-processing Inspection", 
                "Maintenance Request", 
                "Room Change Inquiry"
            ];
            const purposeSelect = document.getElementById('pubPurposeSelect');
            if (!purposeSelect) return;

            purposeSelect.innerHTML = '<option value="">-- Select Purpose --</option>';
            purposes.forEach(p => {
                purposeSelect.innerHTML += `<option value="${p}">${p}</option>`;
            });
        }

        function loadPublicAvailability() {
            const stored = localStorage.getItem('housing_availability');
            if (stored) {
                const avail = JSON.parse(stored);
                const timeInput = document.getElementById('pubTime');
                if (avail.start) timeInput.min = avail.start;
                if (avail.end) timeInput.max = avail.end;
            }
        }

        function submitBooking(event) {
            event.preventDefault();

            const newBooking = {
                id: Date.now(),
                firstName: document.getElementById('pubFirstName').value.trim(),
                lastName: document.getElementById('pubLastName').value.trim(),
                branch: document.getElementById('pubBranch').value,
                contact: document.getElementById('pubContact').value.trim(),
                camp: document.getElementById('pubCampSelect').value,
                building: document.getElementById('pubBuildingSelect').value,
                date: document.getElementById('pubDate').value,
                time: document.getElementById('pubTime').value,
                purpose: document.getElementById('pubPurposeSelect').value,
                comments: document.getElementById('pubComments').value.trim(),
                status: 'Pending',
                staffNotes: '',
                username: document.getElementById('pubFirstName').value.trim().toLowerCase()
            };

            let bookings = JSON.parse(localStorage.getItem('housing_bookings')) || [];
            bookings.push(newBooking);
            localStorage.setItem('housing_bookings', JSON.stringify(bookings));

            showPublicAlert("Your appointment request has been successfully submitted! Staff will review it shortly.", "success");
            document.getElementById('publicBookingForm').reset();
            document.getElementById('pubBuildingSelect').innerHTML = '<option value="">-- Select Camp First --</option>';
        }

        function showPublicAlert(message, type) {
            const alert = document.getElementById('bookingAlert');
            alert.className = `alert alert-${type} mb-4`;
            alert.textContent = message;
            alert.classList.remove('d-none');
            window.scrollTo({ top: 0, behavior: 'smooth' });
            setTimeout(() => alert.classList.add('d-none'), 6000);
        }
    </script>
</body>
</html>
