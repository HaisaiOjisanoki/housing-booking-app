<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Housing Portal</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FullCalendar CSS -->
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-light" onload="initDashboard()">

    <!-- Navigation Bar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="#"><i class="bi bi-house-door-fill me-2"></i>Housing Portal Dashboard</a>
            <div class="d-flex align-items-center">
                <span id="userBadge" class="badge bg-primary me-3 p-2">Role: Loading...</span>
                <button onclick="handleLogout()" class="btn btn-outline-light btn-sm"><i class="bi bi-box-arrow-right me-1"></i>Sign Out</button>
            </div>
        </div>
    </nav>

    <!-- Main Content Container -->
    <div class="container-fluid py-4">
        
        <!-- Status Alert Notification -->
        <div id="dashAlert" class="alert d-none mb-4" role="alert"></div>

        <div class="row g-4">
            <!-- Calendar Column -->
            <div class="col-lg-8">
                <div class="card shadow-sm border-0 h-100">
                    <div class="card-header bg-white py-3 d-flex justify-content-between align-items-center">
                        <h5 class="mb-0 fw-bold"><i class="bi bi-calendar-event me-2 text-primary"></i>Appointment Calendar View</h5>
                        <button class="btn btn-sm btn-outline-primary" onclick="loadBookingsData()"><i class="bi bi-arrow-clockwise me-1"></i>Refresh</button>
                    </div>
                    <div class="card-body">
                        <div id="calendar" style="min-height: 600px;"></div>
                    </div>
                </div>
            </div>

            <!-- Booking Management Column -->
            <div class="col-lg-4">
                <div class="card shadow-sm border-0 h-100">
                    <div class="card-header bg-white py-3">
                        <h5 class="mb-0 fw-bold"><i class="bi bi-journal-check me-2 text-primary"></i>Manage Bookings</h5>
                    </div>
                    <div class="card-body d-flex flex-column">
                        <div class="input-group mb-3">
                            <input type="text" id="searchBooking" class="form-control form-control-sm" placeholder="Search by name or building..." onkeyup="filterBookings()">
                            <span class="input-group-text bg-light"><i class="bi bi-search"></i></span>
                        </div>

                        <!-- Bookings Scrollable List / Table Container -->
                        <div class="table-responsive flex-grow-1" style="max-height: 550px; overflow-y: auto;">
                            <table class="table table-hover align-middle small">
                                <thead class="table-light sticky-top">
                                    <tr>
                                        <th>Details</th>
                                        <th>Date</th>
                                        <th class="text-end">Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="bookingTableBody">
                                    <!-- Injected via JavaScript -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Booking Details / Edit Modal -->
    <div class="modal fade" id="bookingModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold" id="modalTitle">Booking Information</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="bookingForm">
                        <input type="hidden" id="editBookingId">
                        <div class="mb-3">
                            <label class="form-label text-muted small">Visitor / Guest Name</label>
                            <input type="text" id="modalGuestName" class="form-control" readonly>
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-muted small">Building / Facility</label>
                            <input type="text" id="modalBuilding" class="form-control" readonly>
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-muted small">Appointment Date & Time</label>
                            <input type="text" id="modalDateTime" class="form-control" readonly>
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-muted small">Current Status</label>
                            <select id="modalStatus" class="form-select">
                                <option value="Pending">Pending</option>
                                <option value="Approved">Approved</option>
                                <option value="Cancelled">Cancelled</option>
                            </select>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Close</button>
                    <button type="button" class="btn btn-danger btn-sm" onclick="deleteCurrentBooking()">Delete Booking</button>
                    <button type="button" class="btn btn-primary btn-sm" onclick="saveBookingChanges()">Save Changes</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- FullCalendar JS -->
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>

    <script>
        let calendar;
        let allBookings = [];
        let currentUser = null;

        function initDashboard() {
            // Check authentication session
            const storedUser = localStorage.getItem('housing_current_user');
            if (!storedUser) {
                window.location.href = '/login';
                return;
            }

            currentUser = JSON.parse(storedUser);
            document.getElementById('userBadge').textContent = `Role: ${currentUser.role} (${currentUser.username})`;

            // Seed sample bookings if none exist in localStorage for demo testing
            if (!localStorage.getItem('housing_bookings')) {
                const sampleBookings = [
                    { id: 101, name: "Staff Sgt. Miller", building: "Building 402 - Room 101", date: "2026-07-26T10:00:00", status: "Approved" },
                    { id: 102, name: "Capt. Davis", building: "Building 405 - Room 204", date: "2026-07-28T14:30:00", status: "Pending" },
                    { id: 103, name: "Sgt. Roberts", building: "Building 402 - Room 112", date: "2026-07-30T09:00:00", status: "Approved" }
                ];
                localStorage.setItem('housing_bookings', JSON.stringify(sampleBookings));
            }

            initCalendar();
            loadBookingsData();
        }

        function initCalendar() {
            const calendarEl = document.getElementById('calendar');
            calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                headerToolbar: {
                    left: 'prev,next today',
                    center: 'title',
                    right: 'dayGridMonth,timeGridWeek,listWeek'
                },
                events: fetchCalendarEvents,
                eventClick: function(info) {
                    openBookingModal(info.event.id);
                }
            });
            calendar.render();
        }

        function fetchCalendarEvents(fetchInfo, successCallback, failureCallback) {
            const bookings = JSON.parse(localStorage.getItem('housing_bookings')) || [];
            
            // Map bookings to FullCalendar event objects
            const events = bookings.map(b => ({
                id: b.id.toString(),
                title: `${b.name} (${b.building})`,
                start: b.date,
                backgroundColor: b.status === 'Approved' ? '#198754' : b.status === 'Cancelled' ? '#dc3545' : '#ffc107',
                textColor: b.status === 'Pending' ? '#000' : '#fff'
            }));

            successCallback(events);
        }

        function loadBookingsData() {
            allBookings = JSON.parse(localStorage.getItem('housing_bookings')) || [];
            renderBookingsTable(allBookings);
            if (calendar) {
                calendar.refetchEvents();
            }
        }

        function renderBookingsTable(bookings) {
            const tbody = document.getElementById('bookingTableBody');
            tbody.innerHTML = '';

            if (bookings.length === 0) {
                tbody.innerHTML = `<tr><td colspan="3" class="text-center text-muted py-4">No bookings found.</td></tr>`;
                return;
            }

            bookings.forEach(b => {
                const tr = document.createElement('tr');
                const badgeClass = b.status === 'Approved' ? 'bg-success' : b.status === 'Cancelled' ? 'bg-danger' : 'bg-warning text-dark';
                
                tr.innerHTML = `
                    <div>
                        <strong>${b.name}</strong><br>
                        <span class="text-muted">${b.building}</span><br>
                        <span class="badge ${badgeClass} mt-1">${b.status}</span>
                    </div>
                    </td>
                    <td>${new Date(b.date).toLocaleDateString()}</td>
                    <td class="text-end">
                        <button class="btn btn-sm btn-outline-primary" onclick="openBookingModal('${b.id}')"><i class="bi bi-pencil-square"></i></button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function filterBookings() {
            const query = document.getElementById('searchBooking').value.toLowerCase();
            const filtered = allBookings.filter(b => 
                b.name.toLowerCase().includes(query) || b.building.toLowerCase().includes(query)
            );
            renderBookingsTable(filtered);
        }

        function openBookingModal(id) {
            const booking = allBookings.find(b => b.id.toString() === id.toString());
            if (!booking) return;

            document.getElementById('editBookingId').value = booking.id;
            document.getElementById('modalGuestName').value = booking.name;
            document.getElementById('modalBuilding').value = booking.building;
            document.getElementById('modalDateTime').value = new Date(booking.date).toLocaleString();
            document.getElementById('modalStatus').value = booking.status;

            const modal = new bootstrap.Modal(document.getElementById('bookingModal'));
            modal.show();
        }

        function saveBookingChanges() {
            const id = document.getElementById('editBookingId').value;
            const newStatus = document.getElementById('modalStatus').value;

            let bookings = JSON.parse(localStorage.getItem('housing_bookings')) || [];
            bookings = bookings.map(b => {
                if (b.id.toString() === id.toString()) {
                    b.status = newStatus;
                }
                return b;
            });

            localStorage.setItem('housing_bookings', JSON.stringify(bookings));
            
            // Hide modal and reload
            const modalEl = document.getElementById('bookingModal');
            const modal = bootstrap.Modal.getInstance(modalEl);
            modal.hide();

            loadBookingsData();
            showNotification("Booking status updated successfully.", "success");
        }

        function deleteCurrentBooking() {
            if (!confirm("Are you sure you want to delete this booking?")) return;

            const id = document.getElementById('editBookingId').value;
            let bookings = JSON.parse(localStorage.getItem('housing_bookings')) || [];
            bookings = bookings.filter(b => b.id.toString() !== id.toString());

            localStorage.setItem('housing_bookings', JSON.stringify(bookings));

            const modalEl = document.getElementById('bookingModal');
            const modal = bootstrap.Modal.getInstance(modalEl);
            modal.hide();

            loadBookingsData();
            showNotification("Booking deleted successfully.", "danger");
        }

        function showNotification(message, type) {
            const alert = document.getElementById('dashAlert');
            alert.className = `alert alert-${type} mb-4`;
            alert.textContent = message;
            alert.classList.remove('d-none');
            setTimeout(() => alert.classList.add('d-none'), 4000);
        }

        function handleLogout() {
            localStorage.removeItem('housing_current_user');
            window.location.href = '/login';
        }
    </script>
</body>
</html>
