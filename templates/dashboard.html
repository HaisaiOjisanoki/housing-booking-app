<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Housing Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light" onload="initDashboard()">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">Housing Portal <span id="currentUserRoleBadge" class="badge bg-secondary ms-2"></span></a>
            <div class="d-flex align-items-center gap-2">
                <a href="/" class="btn btn-outline-light btn-sm">Public Form</a>
                <a href="/login" class="btn btn-outline-danger btn-sm">Log Out</a>
            </div>
        </div>
    </nav>

    <div class="container my-4">
        <h2 class="mb-4" id="portalHeaderTitle">Dashboard</h2>
        <div class="card p-4 shadow-sm bg-white">
            <p class="text-muted">Welcome to your dashboard. Your modular layout is restored.</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function initDashboard() {
            const currentUser = JSON.parse(localStorage.getItem('housing_current_user')) || { username: 'user', role: 'User' };
            document.getElementById('currentUserRoleBadge').innerText = `${currentUser.role} (${currentUser.username})`;
        }
    </script>
</body>
</html>
