<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password - Unaccompanied Housing Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background-color: #f4f6f9; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .card { width: 100%; max-width: 400px; border: none; border-radius: 0.5rem; }
    </style>
</head>
<body>
    <div class="card shadow-sm p-4 bg-white">
        <div class="text-center mb-4">
            <i class="bi bi-key-fill fs-1 text-warning"></i>
            <h3 class="fw-bold mt-2">Update Password</h3>
            <p class="text-muted small">You must change your password on first-time login or after password reset.</p>
        </div>
        {% if error %}
        <div class="alert alert-danger py-2 small" role="alert">{{ error }}</div>
        {% endif %}
        <form action="{{ url_for('change_password_page') }}" method="POST">
            <div class="mb-3">
                <label class="form-label small fw-bold">New Password</label>
                <input type="password" name="new_password" class="form-control" required placeholder="Enter new password">
            </div>
            <div class="mb-4">
                <label class="form-label small fw-bold">Confirm New Password</label>
                <input type="password" name="confirm_password" class="form-control" required placeholder="Confirm new password">
            </div>
            <button type="submit" class="btn btn-primary w-100 fw-bold py-2">
                <i class="bi bi-check2-circle me-1"></i> Save & Continue
            </button>
        </form>
    </div>
</body>
</html>
