<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unaccompanied Housing Appointment Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-light" onload="initPublicPortal()">

    <nav class="navbar navbar-dark bg-dark shadow-sm">
        <div class="container px-4">
            <span class="navbar-brand fw-bold">
                <i class="bi bi-building me-2"></i>Unaccompanied Housing Portal
            </span>
            <a href="{{ url_for('login') }}" class="btn btn-outline-light btn-sm">
                <i class="bi bi-shield-lock me-1"></i>Staff Sign In
            </a>
        </div>
    </nav>

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow border-0">
                    <div class="card-header bg-primary text-white py-3">
                        <h4 class="mb-0 fw-bold"><i class="bi bi-calendar-plus me-2"></i>Schedule Housing Appointment</h4>
                    </div>
                    <div class="card-body p-4">
                        <form id="bookingForm" onsubmit="submitBooking(event)">
                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label class="form-label small fw-bold">First Name *</label>
                                    <input type="text" id="firstName" class="form-control" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label small fw-bold">Last Name *</label>
                                    <input type="text" id="lastName" class="form-control" required>
                                </div>
                            </div>
                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label class="form-label small fw-bold">Branch of Service *</label>
                                    <select id="branch" class="form-select" required>
                                        <option value="">-- Select Branch --</option>
                                        <option value="USMC">USMC</option>
                                        <option value="USN">USN</option>
                                        <option value="USA">USA</option>
                                        <option value="USAF">USAF</option>
                                        <option value="USCG">USCG</option>
                                    </select>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label small fw-bold">Email Address *</label>
                                    <input type="email" id="email" class="form-control" required>
                                </div>
                            </div>
                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label class="form-label small fw-bold">Select Camp *</label>
                                    <select id="campSelect" class="form-select" required onchange="updateBuildingDropdown()">
                                        <option value="">-- Select Camp --</option>
                                    </select>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label small fw-bold">Building Number *</label>
                                    <select id="buildingSelect" class="form-select" required>
                                        <option value="">-- Select Building --</option>
                                    </select>
                                </div>
                            </div>
                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label class="form-label small fw-bold">Appointment Date *</label>
                                    <input type="date" id="bookingDate" class="form-control" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label small fw-bold">Appointment Time *</label>
                                    <input type="time" id="bookingTime" class="form-control" required>
                                </div>
                            </div>
                            <div class="mb-4">
                                <label class="form-label small fw-bold">Purpose of Visit / Remarks *</label>
                                <textarea id="purpose" class="form-control" rows="3" required placeholder="Describe purpose of appointment..."></textarea>
                            </div>
                            <button type="submit" class="btn btn-primary w-100 fw-bold py-2">
                                <i class="bi bi-check-circle me-1"></i>Submit Appointment
                            </button>
                        </form>

                        <div id="successCard" class="alert alert-success mt-4 d-none">
                            <h5 class="fw-bold"><i class="bi bi-check-circle-fill me-2"></i>Appointment Booked Successfully!</h5>
                            <p class="mb-1">Your confirmation code is: <strong id="assignedConfirmationCode" class="text-dark fs-5"></strong></p>
                            <p class="small text-muted mb-0">Please save this code for your records. Assigned building managers can now view and manage your appointment.</p>
                            <button class="btn btn-outline-success btn-sm mt-3" onclick="resetForm()">Book Another Appointment</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let appState = {};

        async function initPublicPortal() {
            try {
                const res = await fetch('/api/state');
                appState = await res.json();
                if (!appState.camps) appState.camps = [];
                if (!appState.camp_buildings) appState.camp_buildings = {};
                if (!appState.bookings) appState.bookings = [];

                const campSelect = document.getElementById('campSelect');
                campSelect.innerHTML = '<option value="">-- Select Camp --</option>';
                appState.camps.forEach(c => {
                    campSelect.innerHTML += `<option value="${c}">${c}</option>`;
                });
            } catch (err) {
                console.error("Error loading application state:", err);
            }
        }

        function updateBuildingDropdown() {
            const camp = document.getElementById('campSelect').value;
            const buildingSelect = document.getElementById('buildingSelect');
            buildingSelect.innerHTML = '<option value="">-- Select Building --</option>';

            if (camp && appState.camp_buildings && appState.camp_buildings[camp]) {
                appState.camp_buildings[camp].forEach(b => {
                    buildingSelect.innerHTML += `<option value="${b}">${b}</option>`;
                });
            }
        }

        async function submitBooking(e) {
            e.preventDefault();

            // Fetch latest state to prevent race conditions
            try {
                const res = await fetch('/api/state');
                appState = await res.json();
            } catch (err) {
                console.error("Error syncing state:", err);
            }

            if (!appState.bookings) appState.bookings = [];

            const code = 'HSG-' + Math.floor(100000 + Math.random() * 900000);

            const newBooking = {
                id: Date.now(),
                confirmationCode: code,
                firstName: document.getElementById('firstName').value.trim(),
                lastName: document.getElementById('lastName').value.trim(),
                branch: document.getElementById('branch').value,
                email: document.getElementById('email').value.trim(),
                camp: document.getElementById('campSelect').value,
                building: document.getElementById('buildingSelect').value,
                date: document.getElementById('bookingDate').value,
                time: document.getElementById('bookingTime').value,
                purpose: document.getElementById('purpose').value.trim(),
                status: 'Pending',
                staffNotes: ''
            };

            appState.bookings.push(newBooking);

            // Save state to backend
            const saveRes = await fetch('/api/state', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(appState)
            });

            if (saveRes.ok) {
                document.getElementById('bookingForm').classList.add('d-none');
                document.getElementById('assignedConfirmationCode').textContent = code;
                document.getElementById('successCard').classList.remove('d-none');
            } else {
                alert('Error submitting appointment. Please try again.');
            }
        }

        function resetForm() {
            document.getElementById('bookingForm').reset();
            document.getElementById('buildingSelect').innerHTML = '<option value="">-- Select Building --</option>';
            document.getElementById('bookingForm').classList.remove('d-none');
            document.getElementById('successCard').classList.add('d-none');
        }
    </script>
</body>
</html>
