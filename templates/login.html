<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Login - Housing Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center py-5" style="min-height: 100vh;">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                
                <div id="loginAlert" class="alert d-none" role="alert"></div>

                <!-- Login Card -->
                <div id="loginCard" class="card shadow border-0">
                    <div class="card-header bg-dark text-white py-3 text-center">
                        <h4 class="mb-0 fw-bold"><i class="bi bi-shield-lock-fill me-2"></i>Staff Portal Sign In</h4>
                    </div>
                    <div class="card-body p-4">
                        <form onsubmit="handleStaffLogin(event)">
                            <div class="mb-3">
                                <label class="form-label small text-muted">Username</label>
                                <input type="text" id="loginUsername" class="form-control" required placeholder="e.g. superadmin">
                            </div>
                            <div class="mb-4">
                                <label class="form-label small text-muted">Password</label>
                                <input type="password" id="loginPassword" class="form-control" required placeholder="Password">
                            </div>
                            <button type="submit" class="btn btn-primary w-100 py-2 fw-bold shadow-sm">
                                <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
                            </button>
                        </form>
                        <div class="text-center mt-3">
                            <a href="{{ url_for('public_booking') }}" class="text-decoration-none small text-muted"><i class="bi bi-arrow-left me-1"></i>Back to Public Booking Portal</a>
                        </div>
                    </div>
                </div>

                <!-- First-Time Password Change & Recovery Email Card (Hidden by default) -->
                <div id="setupCard" class="card shadow border-0 d-none">
                    <div class="card-header bg-warning text-dark py-3 text-center">
                        <h4 class="mb-0 fw-bold"><i class="bi bi-exclamation-triangle-fill me-2"></i>First-Time Account Setup</h4>
                        <p class="small mb-0 text-muted">Please update your password and set a recovery email.</p>
                    </div>
                    <div class="card-body p-4">
                        <form onsubmit="handleFirstTimeSetup(event)">
                            <div class="mb-3">
                                <label class="form-label small text-muted">New Password *</label>
                                <input type="password" id="setupNewPassword" class="form-control" required placeholder="Enter new secure password">
                            </div>
                            <div class="mb-4">
                                <label class="form-label small text-muted">Recovery Email *</label>
                                <input type="email" id="setupRecoveryEmail" class="form-control" required placeholder="recovery@example.com">
                            </div>
                            <button type="submit" class="btn btn-warning w-100 py-2 fw-bold text-dark shadow-sm">
                                <i class="bi bi-check-circle-fill me-2"></i>Save & Continue to Dashboard
                            </button>
                        </form>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let pendingUser = null;

        function handleStaffLogin(e) {
            e.preventDefault();
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value.trim();

            let users = JSON.parse(localStorage.getItem('housing_users')) || [
                { username: "superadmin", password: "password123", role: "Super Admin", assignedCamps: [], assignedBuildings: [], firstLogin: true, recoveryEmail: "" }
            ];

            let user = users.find(u => u.username === username && u.password === password);

            if (!user) {
                showAlert("Invalid username or password.", "danger");
                return;
            }

            // Check if first login or password change required
            if (user.firstLogin || !user.recoveryEmail) {
                pendingUser = user;
                document.getElementById('loginCard').classList.add('d-none');
                document.getElementById('setupCard').classList.remove('d-none');
                return;
            }

            // Successful Login
            localStorage.setItem('housing_current_user', JSON.stringify(user));
            window.location.href = "{{ url_for('dashboard') }}";
        }

        function handleFirstTimeSetup(e) {
            e.preventDefault();
            const newPassword = document.getElementById('setupNewPassword').value.trim();
            const recoveryEmail = document.getElementById('setupRecoveryEmail').value.trim();

            if (!newPassword || !recoveryEmail) {
                alert("Please fill in both fields.");
                return;
            }

            let users = JSON.parse(localStorage.getItem('housing_users')) || [];
            users = users.map(u => {
                if (u.username === pendingUser.username) {
                    u.password = newPassword;
                    u.recoveryEmail = recoveryEmail;
                    u.firstLogin = false;
                }
                return u;
            });

            localStorage.setItem('housing_users', JSON.stringify(users));

            let updatedUser = users.find(u => u.username === pendingUser.username);
            localStorage.setItem('housing_current_user', JSON.stringify(updatedUser));

            window.location.href = "{{ url_for('dashboard') }}";
        }

        function showAlert(message, type) {
            const alert = document.getElementById('loginAlert');
            alert.className = `alert alert-${type} mb-3`;
            alert.textContent = message;
            alert.classList.remove('d-none');
        }
// Automatically seed default superadmin if no users exist in localStorage
if (!localStorage.getItem('housing_users')) {
    localStorage.setItem('housing_users', JSON.stringify([
        { 
            username: "superadmin", 
            password: "password123", 
            role: "Super Admin", 
            firstLogin: false, 
            recoveryEmail: "admin@housing.mil", 
            assignedBuildings: [] 
        }
    ]));
}
    </script>
</body>
</html>
