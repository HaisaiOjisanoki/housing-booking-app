<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Housing Portal</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center vh-100" onload="initAuthStorage()">

    <div class="card shadow p-4" style="width: 100%; max-width: 420px;">
        <div class="text-center mb-4">
            <h3 class="fw-bold">Housing Portal Login</h3>
            <p class="text-muted small">Sign in to manage bookings and schedules</p>
        </div>

        <!-- Error Alert Banner -->
        <div id="loginAlert" class="alert alert-danger d-none py-2 small" role="alert"></div>

        <form onsubmit="handleLogin(event)">
            <div class="mb-3">
                <label for="usernameInput" class="form-label">Username</label>
                <input type="text" class="form-control" id="usernameInput" required placeholder="e.g. superadmin, Admin, User">
            </div>
            <div class="mb-3">
                <label for="passwordInput" class="form-label">Password</label>
                <input type="password" class="form-control" id="passwordInput" required placeholder="password123">
            </div>
            <button type="submit" class="btn btn-primary w-100 mb-3">Sign In</button>
            
            <div class="text-center">
                <!-- Updated to Flask Route Endpoint -->
                <a href="/" class="text-decoration-none small">&larr; Back to Public Booking Form</a>
            </div>
        </form>

        <!-- Quick Demo Credentials Helper for Testing -->
        <div class="mt-4 pt-3 border-top">
            <p class="text-muted small mb-2 text-center">Quick Test Credentials (Click to fill):</p>
            <div class="d-flex justify-content-center gap-2 flex-wrap">
                <button type="button" class="btn btn-outline-secondary btn-sm" onclick="fillCredentials('superadmin', 'password123')">Super Admin</button>
                <button type="button" class="btn btn-outline-secondary btn-sm" onclick="fillCredentials('Admin', 'password123')">Admin</button>
                <button type="button" class="btn btn-outline-secondary btn-sm" onclick="fillCredentials('User', 'password123')">User</button>
            </div>
        </div>
    </div>

    <script>
        function initAuthStorage() {
            const defaultUsers = [
                { id: 1, username: "superadmin", password: "password123", role: "Super Admin", email: "superadmin@housing.mil" },
                { id: 2, username: "Admin", password: "password123", role: "Admin", email: "admin@housing.mil" },
                { id: 3, username: "User", password: "password123", role: "User", email: "user@housing.mil" }
            ];

            if (!localStorage.getItem('housing_users')) {
                localStorage.setItem('housing_users', JSON.stringify(defaultUsers));
            }
        }

        function fillCredentials(username, password) {
            document.getElementById('usernameInput').value = username;
            document.getElementById('passwordInput').value = password;
            hideAlert();
        }

        function showAlert(message) {
            const alertBox = document.getElementById('loginAlert');
            alertBox.textContent = message;
            alertBox.classList.remove('d-none');
        }

        function hideAlert() {
            const alertBox = document.getElementById('loginAlert');
            alertBox.classList.add('d-none');
        }

        function handleLogin(event) {
            event.preventDefault();
            hideAlert();

            const usernameInput = document.getElementById('usernameInput').value.trim().toLowerCase();
            const passwordInput = document.getElementById('passwordInput').value.trim();

            let users = [];
            try {
                users = JSON.parse(localStorage.getItem('housing_users')) || [];
            } catch (e) {
                users = [];
            }

            if (users.length === 0) {
                users = [
                    { id: 1, username: "superadmin", password: "password123", role: "Super Admin", email: "superadmin@housing.mil" },
                    { id: 2, username: "Admin", password: "password123", role: "Admin", email: "admin@housing.mil" },
                    { id: 3, username: "User", password: "password123", role: "User", email: "user@housing.mil" }
                ];
                localStorage.setItem('housing_users', JSON.stringify(users));
            }

            const foundUser = users.find(u => u && u.username && u.username.toLowerCase() === usernameInput && u.password === passwordInput);

            if (foundUser) {
                localStorage.setItem('housing_current_user', JSON.stringify(foundUser));
                // Updated to match Flask route endpoint instead of static .html file
                window.location.href = '/dashboard';
            } else {
                showAlert("Invalid username or password. Please check your credentials.");
            }
        }
    </script>
</body>
</html>
