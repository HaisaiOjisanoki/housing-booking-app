<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Unaccompanied Housing Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background-color: #f4f6f9; min-height: 100vh; }
        .card { border: none; border-radius: 0.5rem; }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center">

    <div class="card shadow-sm p-4" style="width: 100%; max-width: 400px;">
        <div class="text-center mb-4">
            <i class="bi bi-building-check fs-1 text-primary"></i>
            <h3 class="fw-bold mt-2 mb-1">Staff Portal</h3>
            <p class="text-muted small">Sign in to manage service member bookings</p>
        </div>

        {% if error %}
        <div class="alert alert-danger py-2 small text-center" role="alert">
            <i class="bi bi-exclamation-triangle-fill me-1"></i> {{ error }}
        </div>
        {% endif %}

        <form action="{{ url_for('login') }}" method="POST">
            <div class="mb-3">
                <label class="form-label small fw-bold text-secondary">Username</label>
                <div class="input-group">
                    <span class="input-group-text bg-light"><i class="bi bi-person"></i></span>
                    <input type="text" name="username" class="form-control" placeholder="Enter username" required autofocus>
                </div>
            </div>
            
            <div class="mb-4">
                <label class="form-label small fw-bold text-secondary">Password</label>
                <div class="input-group">
                    <span class="input-group-text bg-light"><i class="bi bi-lock"></i></span>
                    <input type="password" name="password" class="form-control" placeholder="Enter password" required>
                </div>
            </div>

            <button type="submit" class="btn btn-primary w-100 fw-bold py-2">
                <i class="bi bi-box-arrow-in-right me-1"></i> Sign In
            </button>
        </form>
        
        <div class="text-center mt-3">
            <a href="{{ url_for('index') }}" class="text-decoration-none small text-muted">
                <i class="bi bi-arrow-left me-1"></i> Back to Public Booking Portal
            </a>
        </div>
    </div>

</body>
</html>
