<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Unaccompanied Housing Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center vh-100">

    <div class="card shadow border-0 p-4" style="width: 100%; max-width: 400px;">
        <div class="text-center mb-4">
            <h3 class="fw-bold text-dark"><i class="bi bi-shield-lock-fill text-primary me-2"></i>Housing Portal</h3>
            <p class="text-muted small">Sign in to staff dashboard</p>
        </div>

        <div id="errorAlert" class="alert alert-danger d-none py-2 small" role="alert"></div>

        <form onsubmit="handleLogin(event)">
            <div class="mb-3">
                <label class="form-label small text-muted fw-bold">Username</label>
                <div class="input-group">
                    <span class="input-group-text bg-white"><i class="bi bi-person"></i></span>
                    <input type="text" id="loginUsername" class="form-control" required autocomplete="username">
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label small text-muted fw-bold">Password</label>
                <div class="input-group">
                    <span class="input-group-text bg-white"><i class="bi bi-key"></i></span>
                    <input type="password" id="loginPassword" class="form-control" required autocomplete="current-password">
                </div>
            </div>
            <button type="submit" class="btn btn-primary w-100 fw-bold py-2">Sign In</button>
        </form>

        <div class="text-center mt-3">
            <a href="{{ url_for('index') }}" class="small text-decoration-none text-muted"><i class="bi bi-arrow-left me-1"></i>Back to Visitor Booking Portal</a>
        </div>
    </div>

    <script>
        async function handleLogin(e) {
            e.preventDefault();
            const usernameInput = document.getElementById('loginUsername').value.trim();
            const passwordInput = document.getElementById('loginPassword').value.trim();
            const errorAlert = document.getElementById('errorAlert');

            errorAlert.classList.add('d-none');

            try {
                const response = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: usernameInput, password: passwordInput })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    // Save full user profile to localStorage for dashboard role/building checks
                    localStorage.setItem('housing_current_user', JSON.stringify({
                        username: data.username,
                        role: data.role,
                        assignedBuildings: data.assignedBuildings || []
                    }));
                    window.location.href = "{{ url_for('dashboard') }}";
                } else {
                    errorAlert.textContent = data.message || 'Invalid username or password.';
                    errorAlert.classList.remove('d-none');
                }
            } catch (err) {
                errorAlert.textContent = 'An error occurred connecting to the server.';
                errorAlert.classList.remove('d-none');
            }
        }
    </script>
</body>
</html>
