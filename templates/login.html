<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Housing Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center vh-100" onload="initLogin()">

    <div class="card shadow border-0 p-4" style="width: 100%; max-width: 400px;">
        <div class="text-center mb-4">
            <h3 class="fw-bold text-dark"><i class="bi bi-shield-lock-fill text-primary me-2"></i>Housing Portal</h3>
            <p class="text-muted small">Sign in to staff dashboard</p>
        </div>

        <div id="loginError" class="alert alert-danger d-none py-2 small" role="alert"></div>

        <form onsubmit="handleLogin(event)">
            <div class="mb-3">
                <label class="form-label small text-muted">Username</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-person"></i></span>
                    <input type="text" id="loginUsername" class="form-control" required placeholder="Enter username">
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label small text-muted">Password</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-key"></i></span>
                    <input type="password" id="loginPassword" class="form-control" required placeholder="Enter password">
                </div>
            </div>
            <button type="submit" class="btn btn-primary w-100 fw-bold py-2">Sign In</button>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function initLogin() {
            // Automatically seed default superadmin permanently if no users exist in localStorage
            if (!localStorage.getItem('housing_users')) {
                localStorage.setItem('housing_users', JSON.stringify([
                    { 
                        username: "superadmin", 
                        password: "password123", 
                        role: "Super Admin", 
                        firstLogin: false, 
                        recoveryEmail: "admin@housing.mil", 
                        assignedBuildings: [] 
                    }
                ]));
            }
        }

        function handleLogin(e) {
            e.preventDefault();
            const usernameInput = document.getElementById('loginUsername').value.trim();
            const passwordInput = document.getElementById('loginPassword').value.trim();
            const errorBox = document.getElementById('loginError');

            let users = JSON.parse(localStorage.getItem('housing_users')) || [];
            let user = users.find(u => u.username === usernameInput && u.password === passwordInput);

            if (!user) {
                errorBox.textContent = "Invalid username or password.";
                errorBox.classList.remove('d-none');
                return;
            }

            localStorage.setItem('housing_current_user', JSON.stringify(user));
            window.location.href = "{{ url_for('dashboard') }}";
        }
    </script>
</body>
</html>
